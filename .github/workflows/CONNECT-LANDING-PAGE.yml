name: CONNECT-LANDING-PAGE

on:
  push:
    branches:
      - main
    paths:
      - '**/Connect-Landing-Page.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repository Code
      uses: actions/checkout@v4

    - name: 🐍 Thiết lập môi trường Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 🛠️ Tự động dò tìm và Thực thi Script EATHESEN
      run: |
        # Dò tìm vị trí chính xác của script trong workspace
        SCRIPT_PATH=$(find . -name "Connect-Landing-Page.py" -print -quit)
        
        if [ -z "$SCRIPT_PATH" ]; then
          echo "❌ LỖI: Không tìm thấy file Connect-Landing-Page.py trong repository!"
          exit 1
        fi
        
        echo "[+] Đã tìm thấy script tại: $SCRIPT_PATH"
        echo "[+] Khởi chạy biên dịch hệ thống..."
        python "$SCRIPT_PATH"

    - name: 💾 Tự động đồng bộ và Đẩy thay đổi lên GitHub
      run: |
        git config --global user.name "donabico-global-media-admin"
        git config --global user.email "donabico.media.system@gmail.com"
        
        # Tìm file landing_pages.html vừa tạo ra để add vào git
        OUTPUT_PATH=$(find . -name "landing_pages.html" -print -quit)
        
        if [ -z "$OUTPUT_PATH" ]; then
          # Nếu chưa có sẵn cây thư mục, fallback về add toàn bộ thư mục 8000kicks
          git add "**/landing_pages.html" 2>/dev/null || git add .
        else
          echo "[+] Ghi nhận file đầu ra tại: $OUTPUT_PATH"
          git add "$OUTPUT_PATH"
        fi
        
        if git diff --staged --quiet; then
          echo "[-] Không có sự thay đổi nào trong mã nguồn landing_pages.html."
        else
          git commit -m "🚀 [Automated] Sync & Compile 8000Kicks Landing Page v3000-Ω"
          git push origin main
        fi
