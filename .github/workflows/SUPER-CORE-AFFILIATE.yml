name: SUPER-CORE-AFFILIATE

on:
  schedule:
    # Chạy tự động chu kỳ đệ quy mỗi 5 phút liên tục 24/7
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sota-evolution:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true
          # Lấy toàn bộ lịch sử commit để phục vụ quá trình rebase mượt mà
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Harmonic Calibration (Execute Core Script)
        run: python "Super Core Affiliate/Super-Core-Affiliate.py"

      - name: Synchronize Singularity (Commit and Push Gateway)
        run: |
          git config --global user.name "EATHESEN-CORE-BOT"
          git config --global user.email "core@donabicomedia.net"
          
          git add system_bridge.json
          if ! git diff --cached --quiet; then
            git commit -m "¢24-Evolution: Sync Matrix $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
            
            # GIẢI PHÁP SỬA LỖI: Kéo dữ liệu mới nhất về và rebase đè commit của bot lên trên
            git pull --rebase origin main
            
            # Đẩy dữ liệu an toàn lên hệ thống
            git push origin main
          else
            echo "[EATHESEN] Không có sự thay đổi nào được phát hiện trong chu kỳ này."
          fi
