name: "AUTO-CORE-AFFILIATE"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  autonomous-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}

      - run: |
          pip install langgraph jinja2 requests
          
          # TỰ ĐỘNG DÒ TÌM BỘ CORE (Dù nằm ở đâu cũng tìm ra)
          CORE_PATH=$(find . -name "Super-Core-Affiliate.py" | head -n 1)
          
          if [ -z "$CORE_PATH" ]; then
            echo "[🚨 LỖI] Không tìm thấy tệp Core!"
            exit 1
          fi
          
          echo "[📡 KÍCH HOẠT] Đang chạy: $CORE_PATH"
          python3 "$CORE_PATH"

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update Landing Page locally"
          file_pattern: 'index.html'
