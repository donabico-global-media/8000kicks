name: "AUTO-CORE-AFFILIATE"

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  autonomous-engine:
    runs-on: ubuntu-latest
    steps:
      - name: "🎛️ Hạ cánh Codebase Vệ tinh"
        uses: actions/checkout@v4

      - name: "🌀 Khởi tạo Môi trường Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 Cài đặt Thư viện Lõi"
        run: |
          python -m pip install --upgrade pip
          pip install langgraph jinja2

      - name: "🚀 Kích hoạt Bộ não Super-Core (Tự động dò tìm)"
        run: |
          echo "[📡 SEARCHING] Đang tìm kiếm tệp Super-Core-Affiliate.py..."
          # Lệnh find này sẽ tự động tìm tệp bất kể Chỉ huy để ở thư mục nào
          CORE_FILE=$(find . -name "Super-Core-Affiliate.py" | head -n 1)
          
          if [ -z "$CORE_FILE" ]; then
            echo "[🚨 CRITICAL] Không tìm thấy tệp Super-Core-Affiliate.py trong repo!"
            exit 1
          fi
          
          echo "[✅ FOUND] Tệp được tìm thấy tại: $CORE_FILE"
          python3 "$CORE_FILE"
          echo "[✅ ENGINE SUCCESS] Landing Page đã được tái tạo."

      - name: "💾 Đồng bộ hóa kết quả"
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update Landing Page: 8000kicks Super Core"
          file_pattern: 'index.html'
