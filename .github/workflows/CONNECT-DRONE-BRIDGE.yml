name: "CONNECT-DRONE-BRIDGE"

on:
  repository_dispatch:
    types: [LAUNCH_DRONE_MESH_CONNECT] # Chờ Tổng trạm Kho 4 phát lệnh gọi sang
  workflow_dispatch:                  # Giữ nút bấm chạy tay nếu cần

permissions:
  contents: read

jobs:
  mesh-sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: "🎛️ Checkout Vệ Tinh Codebase"
        uses: actions/checkout@v4

      - name: "🌀 Thiết lập môi trường Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: "📦 Cài đặt thư viện mạng"
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: "📡 Khai hỏa Mạng lưới - Kết nối thẳng về Drone_Mesh_Controller"
        env:
          # Bóc lấy mã Token an toàn do Kho 4 gửi kèm trong gói hàng
          BRIDGE_TOKEN: ${{ github.event.client_payload.bridge_temporary_token || github.token }}
        run: |
          echo "📡 Đang nạp Token định danh nhận từ Tổng trạm..."
          if [ -f "Modules/Connect-Drone-Bridge.py" ]; then
            python3 Modules/Connect-Drone-Bridge.py
          else
            echo "❌ LỖI HỆ THỐNG: Không tìm thấy tệp Modules/Connect-Drone-Bridge.py"
            exit 1
          fi
