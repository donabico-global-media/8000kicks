name: "ACTIVE-MODULES-SOTA-SYNC"

on:
  schedule:
    - cron: '*/30 * * * *' # Kích hoạt mỗi 30 phút
  workflow_dispatch:

permissions:
  contents: write

jobs:
  execute-siphon-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Sử dụng phiên bản SOTA mới nhất

      - name: Install Ecosystem Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic loguru # Thêm loguru để debug chuyên nghiệp

      - name: Run EATHESEN Dynamic Siphon Matrix
        env:
          TARGET_URL: 'https://donabico-global-media.github.io/8000kicks/'
        run: |
          echo "=== EATHESEN V3000-Ω SOTA AUTO-INJECTION ==="
          cd Modules
          
          # Tự động duyệt và kích hoạt mọi file .py trong thư mục Modules
          # Loại bỏ chính file điều phối để tránh đệ quy nếu cần thiết
          for script in *.py; do
            if [ "$script" != "Active-Modules.py" ]; then
              echo "[EXECUTING] $script..."
              # Cơ chế tự vá lỗi: Nếu chạy lỗi vẫn tiếp tục các module khác
              python "$script" --url "$TARGET_URL" || echo "[V3000-RECOVERY] Module $script gặp lỗi, bỏ qua và tiếp tục..."
            fi
          done
          
          # Chạy file điều phối chính cuối cùng
          python Active-Modules.py --url "$TARGET_URL"

      - name: Commit & Push Telemetry Reports
        run: |
          git config --global user.name "AETH-V5000-AUTOBOT"
          git config --global user.email "sre-admin@donabico.global"
          
          # Chỉ commit nếu có thay đổi trong file báo cáo
          if [ -n "$(git status --porcelain Modules/traffic_report.json)" ]; then
            git add Modules/traffic_report.json
            git commit -m "chore(siphon): auto-update telemetry [skip ci]"
            git push origin main
          else
            echo "[V3000-INFO] Không có dữ liệu mới để đồng bộ."
          fi
          
