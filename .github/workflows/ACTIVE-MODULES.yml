name: ACTIVE-MODULES

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL mục tiêu để quét dữ liệu'
        required: true
        default: 'https://donabico-global-media.github.io/8000kicks/'

permissions:
  contents: write

jobs:
  execute-siphon-matrix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Pip Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Ecosystem Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic

      - name: Run EATHESEN Active Modules
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://donabico-global-media.github.io/8000kicks/' }}
        run: |
          echo "=== EATHESEN V3000-Ω ACTIVE-MODULES ==="
          echo "Triggered at: $(date -u)"
          echo "Targeting URL: $TARGET_URL"
          echo "======================================================================"
          
          # Di chuyển vào Modules và thực thi, bọc thêm toán tử || true để bảo vệ luồng Actions khỏi lỗi crash luồng phụ của Python
          cd Modules
          python Active-Modules.py --url "$TARGET_URL" || echo "[V3000-WARNING] Ma trận hoàn thành kèm cảnh báo luồng phụ."
          
          echo "======================================================================"
          echo "[COMPLETE] Đã kích hoạt xong toàn bộ module hệ thống."

      - name: Commit & Push Telemetry Reports
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Kiểm tra chính xác sự tồn tại của file từ thư mục gốc
          if [ -f "Modules/traffic_report.json" ]; then
            git add Modules/traffic_report.json
            
            # Khóa an toàn: Nếu không có thay đổi gì mới so với commit trước, không thực hiện lệnh commit để tránh bị lỗi Exit Code 1
            if git diff-index --quiet HEAD --; then
              echo "[V3000-INFO] Telemetry report không có thay đổi mới. Bỏ qua Push."
            else
              echo "[V3000-INFO] Phát hiện dữ liệu Telemetry mới. Tiến hành cập nhật kho lưu trữ..."
              git commit -m "chore(telemetry): update active modules report [skip ci]"
              git push
            fi
          else
            echo "[V3000-WARNING] Không tìm thấy file traffic_report.json để cập nhật!"
          fi
