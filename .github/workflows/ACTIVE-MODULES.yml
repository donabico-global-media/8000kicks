name: ACTIVE-MODULES

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL mục tiêu để quét dữ liệu'
        required: true
        default: 'https://donabico-global-media.github.io/8000kicks/'

permissions:
  contents: write

jobs:
  execute-siphon-matrix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Pip Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Ecosystem Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic

      - name: Run EATHESEN Active Modules
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://donabico-global-media.github.io/8000kicks/' }}
        run: |
          echo "=== EATHESEN V3000-Ω ACTIVE-MODULES ==="
          echo "Triggered at: $(date -u)"
          echo "Targeting URL: $TARGET_URL"
          echo "======================================================================"
          
          cd Modules
          
          # 1. Chạy file điều phối chính (Kích hoạt 4 module mặc định)
          python Active-Modules.py --url "$TARGET_URL" || echo "[V3000-WARNING] Ma trận chính hoàn thành với cảnh báo."
          
          echo "======================================================================"
          echo "[V3000-BRIDGE] Tiến hành kích hoạt cưỡng bức các lõi Siphon bị sót..."
          
          # 2. Ép chạy trực tiếp 3 lõi marketing 0 đồng quan trọng nhất
          if [ -f "Affiliate-Network-Siphon.py" ]; then
            echo "[FORCED ACTIVE] Khởi chạy: Affiliate-Network-Siphon.py"
            python Affiliate-Network-Siphon.py --url "$TARGET_URL" || echo "Affiliate Siphon gặp lỗi nhỏ."
          fi
          
          if [ -f "SEO-Shield-Siphon.py" ]; then
            echo "[FORCED ACTIVE] Khởi chạy: SEO-Shield-Siphon.py"
            python SEO-Shield-Siphon.py --url "$TARGET_URL" || echo "SEO Shield gặp lỗi nhỏ."
          fi
          
          if [ -f "Social-Preview-Siphon.py" ]; then
            echo "[FORCED ACTIVE] Khởi chạy: Social-Preview-Siphon.py"
            python Social-Preview-Siphon.py --url "$TARGET_URL" || echo "Social Preview gặp lỗi nhỏ."
          fi
          
          echo "======================================================================"
          echo "[COMPLETE] Toàn bộ 7/7 module hệ thống đã được xử lý."

      - name: Commit & Push Telemetry Reports
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f "Modules/traffic_report.json" ]; then
            git add Modules/traffic_report.json
            
            # Kiểm tra xem có thay đổi thực sự hay không để tránh lỗi gãy Exit Code 1
            if git diff-index --quiet HEAD --; then
              echo "[V3000-INFO] Telemetry report không đổi. Bỏ qua commit."
            else
              echo "[V3000-INFO] Cập nhật dữ liệu mới lên kho lưu trữ."
              git commit -m "chore(telemetry): update active modules report [skip ci]"
              git push
            fi
          else
            echo "[V3000-WARNING] Không tìm thấy file traffic_report.json"
          fi
          
