name: "RECEIVE-DRONE-BRIDGE"

on:
  schedule:
    - cron: '*/10 * * * *'   # Duy trì nhịp đập hệ thống tự động mỗi 10 phút 24/7

  repository_dispatch:
    types: [LAUNCH_DRONE_BRIDGE] # Bắt chính xác tần số phát từ Engine-Drone-Core.py tại Kho 4

permissions:
  contents: write
  actions: write

jobs:
  drone-bridge-sync:
    runs-on: ubuntu-latest
    concurrency:
      group: drone-bridge-8000kicks
      cancel-in-progress: true # Tự động hủy luồng cũ nếu luồng mới được kích hoạt đè lên

    steps:
      - name: "🎛️ Checkout Drone Substrate"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🌀 Thiết lập môi trường Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: "📥 Trích xuất và Ghi đè Payload dữ liệu"
        if: github.event_name == 'repository_dispatch'
        env:
          PAYLOAD_HTML: ${{ github.event.client_payload.html_content }}
        run: |
          echo "📡 Kết nối cổng kết tinh dữ liệu từ Kho 4..."
          if [ -z "$PAYLOAD_HTML" ]; then
            echo "⚠️ Payload rỗng hoặc không chứa dữ liệu cấu trúc. Bỏ qua ghi đè."
          else
            # Sử dụng biến môi trường an toàn để tránh lỗi cú pháp ký tự đặc biệt của HTML
            echo "$PAYLOAD_HTML" > index.html
            echo "✅ Cập nhật index.html thành công từ luồng tinh chỉnh mạng lưới."
          fi

      - name: "🚀 Kích nổ Toàn bộ Modules phụ trợ"
        run: |
          if [ -d "Modules" ]; then
            echo "🔍 Phát hiện thư mục vận hành. Đang quét danh sách giao thức Modules/*.py ..."
            for module in Modules/*.py; do
              if [ -f "$module" ]; then
                echo "⚡ Khởi chạy tiến trình Module: $module"
                python3 "$module" || echo "⚠️ Cảnh báo lỗi tại $module, luồng chính vẫn tiếp tục..."
              fi
            done
          else
            echo "ℹ️ Không tìm thấy thư mục Modules phụ trợ. Bỏ qua bước quét."
          fi

      - name: "🔒 Khóa và Đồng bộ hóa Trạng thái Mạng lưới (Git Push)"
        run: |
          git config --global user.name "AETH-V5000-MASTER-CORE"
          git config --global user.email "sre-admin@donabico.global"

          # Đồng bộ trạng thái nhánh main cục bộ với máy chủ trước khi xử lý dữ liệu
          git fetch origin main
          git checkout -B main origin/main || git checkout -B main

          # Đảm bảo duy trì cấu trúc thư mục không lỗi
          mkdir -p Modules
          git add index.html Modules/

          if git diff --cached --quiet; then
            echo "✅ Không phát hiện biến động dữ liệu mới. Hủy tiến trình đẩy Git."
            exit 0
          fi

          git commit -m "sys(drone-bridge): mesh core auto-sync [skip ci]" || true

          # Vòng lặp tái kết nối cổng đẩy dữ liệu nếu nghẽn mạng
          for i in {1..5}; do
            if git push origin main --force; then
              echo "✅ [ĐỒNG BỘ THÀNH CÔNG LÊN MẠNG LƯỚI]"
              exit 0
            else
              echo "⚠️ Thử lại cổng đẩy dữ liệu lần $i..."
              sleep 3
            fi
          done
          echo "❌ Lỗi: Không thể kết nối cổng Git đẩy dữ liệu sau 5 lần thử."
          exit 1

      - name: "📡 Tín hiệu Trạng thái Cuối"
        if: success()
        run: |
          echo "✅ [SUCCESS] Mạng lưới cầu nối Drone hoạt động hoàn hảo lúc $(date -u)"
