      - name: "Lock and Push Update State"
        run: |
          git config --global user.name "AETH-V5000-MASTER-CORE"
          git config --global user.email "sre-admin@donabico.global"
          
          # Cấu hình để không cần nhập mật khẩu khi push
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          
          # Đảm bảo đồng bộ với nhánh remote
          git fetch origin main
          git reset --hard origin/main
          
          # Commit nội dung mới
          git add index.html
          git commit -m "sys(drone-mesh): central module synchronization [skip ci]" || echo "Không có thay đổi"
          
          # Đẩy code lên bằng quyền từ GITHUB_TOKEN
          git push origin main
