name: "RECEIVE-DRONE-UPDATE"

on:
  repository_dispatch:
    types: [LAUNCH_DRONE_LANDING_PAGE_UPDATE]

permissions:
  contents: write

jobs:
  sync-and-rebuild:
    runs-on: ubuntu-latest
    concurrency:
      group: drone-mesh-8000kicks
      cancel-in-progress: true     # Chỉ bản mới nhất chạy, cancel bản cũ ngay

    steps:
      - name: "Checkout Drone Substrate"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Catch Dynamic Payload & Write File"
        env:
          RAW_HTML_CONTENT: ${{ github.event.client_payload.html_content }}
        run: |
          cat << 'EOF' > index.html
          ${{ github.event.client_payload.html_content }}
          EOF

      - name: "Infinite Module Connection & Execution"
        run: |
          echo "Đang quét các Module tại 8000kicks/Modules/..."
          for module in Modules/*.py; do
            if [ -f "$module" ]; then
              echo "Kích nổ Module: $module"
              python3 "$module" || echo "Module $module gặp sự cố, hệ thống vẫn tiếp tục..."
            fi
          done

      - name: "Lock and Push Update State (Force-Mesh Mode) — FINAL DỨT ĐIỂM"
        run: |
          git config --global user.name "AETH-V5000-MASTER-CORE"
          git config --global user.email "sre-admin@donabico.global"

          # Retry toàn bộ quy trình git tối đa 6 lần
          for i in {1..6}; do
            echo "=== Lần thử push $i/6 ==="

            git fetch origin main
            git checkout -B main origin/main || git checkout -B main

            # Ghi đè index.html từ payload (đảm bảo nội dung mới nhất)
            cat << 'EOF' > index.html
            ${{ github.event.client_payload.html_content }}
            EOF

            git add index.html

            if git diff --cached --quiet; then
              echo "Không có thay đổi mới. Bỏ qua commit & push."
              exit 0
            fi

            git commit -m "sys(drone-mesh): central module synchronization [skip ci]" || true

            # Force push
            if git push origin main --force; then
              echo "✅ PUSH THÀNH CÔNG ở lần thử $i"
              exit 0
            else
              echo "⚠️ Push thất bại lần $i, chờ 3 giây rồi thử lại..."
              sleep 3
            fi
          done

          echo "❌ Đã thử 6 lần vẫn thất bại. Dừng workflow."
          exit 1

      - name: "Signal Back to Control Center"
        if: success()
        env:
          TEMPORARY_TOKEN: ${{ github.event.client_payload.one_time_token }}
        run: |
          curl -X POST \
            -H "Authorization: bearer $TEMPORARY_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/donabico-global-media/KHO-4-DRONE-LANDING-PAGE-CONTROL-CENTER/dispatches \
            -d '{"event_type": "REPORT_8000KICKS_SYNC_SUCCESS", "client_payload": {"status": "full_mesh_deployed"}}'