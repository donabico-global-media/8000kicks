name: "RECEIVE-DRONE-UPDATE"

on:
  repository_dispatch:
    types: [LAUNCH_DRONE_LANDING_PAGE_UPDATE]

permissions:
  contents: write

jobs:
  sync-and-rebuild:
    runs-on: ubuntu-latest
    concurrency:
      group: drone-mesh-8000kicks
      cancel-in-progress: true

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Write index.html from Payload"
        env:
          RAW_HTML_CONTENT: ${{ github.event.client_payload.html_content }}
        run: |
          cat << 'EOF' > index.html
          ${{ github.event.client_payload.html_content }}
          EOF

      - name: "Run All Siphon Modules (Google + Bing + AI Cache)"
        run: |
          echo "📡 Đang chạy Modules Siphon..."
          for module in Modules/*.py; do
            if [ -f "$module" ]; then
              echo "🚀 Thực thi: $module"
              python3 "$module" || echo "⚠️ $module lỗi → bỏ qua"
            fi
          done

      - name: "Lock and Push Update State (Robust Auto 24/7)"
        run: |
          git config --global user.name "AETH-V5000-MASTER-CORE"
          git config --global user.email "sre-admin@donabico.global"

          # Retry loop mạnh để chống race condition
          for i in {1..6}; do
            echo "=== Lần thử $i/6 ==="

            git fetch origin main
            git checkout -B main origin/main || git checkout -B main

            # Ghi đè index.html từ payload
            cat << 'EOF' > index.html
            ${{ github.event.client_payload.html_content }}
            EOF

            git add index.html

            if git diff --cached --quiet; then
              echo "Không có thay đổi. Bỏ qua."
              exit 0
            fi

            git commit -m "sys(drone-mesh): central module synchronization [skip ci]" || true

            if git push origin main --force-with-lease || git push origin main --force; then
              echo "✅ PUSH THÀNH CÔNG ở lần $i"
              exit 0
            else
              echo "⚠️ Thất bại lần $i → retry sau 3s"
              sleep 3
            fi
          done

          echo "❌ Thử 6 lần vẫn fail"
          exit 1

      - name: "Signal Back to Control Center"
        if: success()
        env:
          TEMPORARY_TOKEN: ${{ github.event.client_payload.one_time_token }}
        run: |
          curl -X POST \
            -H "Authorization: bearer $TEMPORARY_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/donabico-global-media/KHO-4-DRONE-LANDING-PAGE-CONTROL-CENTER/dispatches \
            -d '{"event_type": "REPORT_8000KICKS_SYNC_SUCCESS", "client_payload": {"status": "success"}}'
