name: "RECEIVE-DRONE-UPDATE"

on:
  repository_dispatch:
    types: [LAUNCH_DRONE_LANDING_PAGE_UPDATE]

permissions:
  contents: write

jobs:
  sync-and-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Drone Substrate"
        uses: actions/checkout@v4 

      # VÁ LỖI NỀN TẢNG: Ghi đè cấu trúc landing page
      - name: "Catch Dynamic Payload & Write File"
        env:
          RAW_HTML_CONTENT: ${{ github.event.client_payload.html_content }}
        run: |
          cat << 'EOF' > index.html
          ${{ github.event.client_payload.html_content }}
          EOF

      # CẤU TRÚC KẾT NỐI VÔ HẠN: Quét tự động toàn bộ thư mục Modules
      - name: "Infinite Module Connection & Execution"
        run: |
          echo "📡 Đang quét toàn bộ các nút lệnh (Modules) tại 8000kicks/Modules/..."
          
          # Lặp qua tất cả file có đuôi .py trong thư mục Modules
          for module in Modules/*.py; do
            if [ -f "$module" ]; then
              echo "🚀 Kích nổ Module: $module"
              python3 "$module" || echo "⚠️ Module $module gặp sự cố nhưng hệ thống vẫn tiếp tục..."
            fi
          done
          
          echo "✅ Tất cả các module trong thư mục đã được kết nối và thực thi."

      - name: "Lock and Push Update State"
        run: |
          git config --global user.name "AETH-V5000-MASTER-CORE"
          git config --global user.email "sre-admin@donabico.global"
          
          git add index.html
          git diff-index --quiet HEAD || git commit -m "sys(drone-mesh): nodal-sync modules integration [skip ci]"
          git push origin main

      - name: "Signal Back to Control Center"
        if: success()
        env:
          TEMPORARY_TOKEN: ${{ github.event.client_payload.one_time_token }}
        run: |
          curl -X POST \
            -H "Authorization: bearer $TEMPORARY_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/donabico-global-media/KHO-4-DRONE-LANDING-PAGE-CONTROL-CENTER/dispatches \
            -d '{"event_type": "REPORT_8000KICKS_SYNC_SUCCESS", "client_payload": {"status": "full_mesh_deployed"}}'
            
