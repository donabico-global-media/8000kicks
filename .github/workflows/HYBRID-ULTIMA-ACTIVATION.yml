name: A2A-HYBRID-ULTIMA-ACTIVATION
on:
  push:
    branches: [ main, master ]
    paths: ['Protocol/**']
  workflow_dispatch:
jobs:
  a2a-real-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install -r requirements.txt
      - run: python Protocol/A2A_Hybrid_V3000_ULTIMA.py
      - run: python -c "
          from Protocol.A2A_Hybrid_V3000_ULTIMA import A2AHybridUltima
          a2a = A2AHybridUltima()
          print(a2a.process_signal('workflow_test', {'source': 'github-actions'}))
        "