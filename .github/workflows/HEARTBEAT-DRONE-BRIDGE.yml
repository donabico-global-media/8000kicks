name: "HEARTBEAT-DRONE-BRIDGE"

on:
  schedule:
    - cron: '*/15 * * * *'   # Tự động phát xung 15 phút một lần
  workflow_dispatch:        # NÚT BẤM KÍCH HOẠT THỦ CÔNG (Bắt buộc phải có)

permissions:
  contents: read

jobs:
  transmit-pulse:
    runs-on: ubuntu-latest
    steps:
      - name: "🎛️ Checkout Drone Codebase"
        uses: actions/checkout@v4

      - name: "🌀 Thiết lập môi trường Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: "📦 Cài đặt thư viện requests"
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: "🔑 Khởi tạo Token Độc quyền từ V3000-BRIDGE"
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: "📡 Phát sóng Tín hiệu Heartbeat về Tổng trạm KHO-4"
        env:
          BRIDGE_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          if [ -f "drone_heartbeat.py" ]; then
            python3 drone_heartbeat.py
          elif [ -f "Modules/drone_heartbeat.py" ]; then
            python3 Modules/drone_heartbeat.py
          else
            echo "❌ Không tìm thấy tệp drone_heartbeat.py tại gốc hoặc trong Modules."
            exit 1
          fi
