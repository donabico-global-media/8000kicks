name: TRAFFIC-SIPHON

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Traffic-Siphon
        run: python3 Modules/Traffic-Siphon.py --url "https://donabico-global-media.github.io/8000kicks/"
          
      - name: Commit Report
        run: |
          git config user.name "Siphon Bot"
          git config user.email "bot@github.com"
          git add Modules/traffic_report.json
          git commit -m "Update traffic report"
          git push
          
