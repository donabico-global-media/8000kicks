name: MCP-ULTIMA-ACTIVATION

on:
  push:
    branches: [ main, master ]
    paths:
      - '.mcp/**'
      - 'MCP_Core_V3000_ULTIMA.py'
  workflow_dispatch:

jobs:
  activate-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install --upgrade pip

      - name: Run MCP Core ULTIMA
        run: python MCP_Core_V3000_ULTIMA.py

      - name: Upload MCP Logs
        uses: actions/upload-artifact@v4
        with:
          name: mcp-logs
          path: mcp_ultima.log

      - name: Self-Healing Check
        run: |
          echo "¢24 Self-Healing Check Complete - MCP-ULTIMA"
          ls -la .mcp/
