name: "ACTIVE-MODULES-SOTA"

on:
  schedule:
    - cron: "0 */6 * * *" # Duy trì chu kỳ tự động quét và tiêm giao diện 6 tiếng một lần
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL mục tiêu để rà soát AdTech'
        required: true
        default: 'https://donabico-global-media.github.io/8000kicks/'

# GIẢI PHÁP CỐT LÕI: Khóa luồng đồng bộ để chặn hoàn toàn lỗi tự hủy "Cancelled" của GitHub Pages
concurrency:
  group: github-pages-deploy-lock
  cancel-in-progress: false # Ép luồng triển khai xếp hàng tuần tự, không hủy ngang job đang chạy

permissions:
  contents: write # Cấp quyền ghi cao cấp để Robot chỉnh sửa trực tiếp index.html và push lên kho

jobs:
  execute-siphon-matrix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0 # Lấy toàn bộ lịch sử phục vụ việc rebase mã nguồn an toàn

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Ecosystem Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic

      - name: Run EATHESEN V3000-Ω Matrix Injection
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://donabico-global-media.github.io/8000kicks/' }}
        run: |
          echo "=== EATHESEN V3000-Ω MASTER MATRIX INJECTOR ==="
          cd Modules
          
          # Đổi luật chơi: Giao 100% quyền đại phẫu, tối ưu SEO/Affiliate và tiêm giao diện cho Active-Modules.py
          if [ -f "Active-Modules.py" ]; then
            echo "[FORCED ACTIVE] Khởi chạy Bộ não chỉ huy trung tâm..."
            python Active-Modules.py --url "$TARGET_URL"
          else
            echo "[CRITICAL ERROR] Không tìm thấy tệp điều phối lõi Active-Modules.py!"
            exit 1
          fi

      - name: Commit & Push Production Interface & Reports
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # ĐĂNG KÝ PHẠM VI TÁC ĐỘNG 100%: Gom file index.html đã được tiêm dữ liệu trực tiếp cùng các file log JSON
          git add index.html Modules/traffic_report.json || git add index.html || true
          
          if ! git diff-index --quiet HEAD --; then
            echo "[V3000-INFO] Phát hiện giao diện thay đổi trực tiếp từ Robot. Tiến hành đồng bộ trực tuyến..."
            git commit -m "feat(adtech): dynamic active-modules production injection [skip ci]"
            
            # CHIẾN LƯỢC AN TOÀN: Rebase đồng bộ trước khi đẩy để loại bỏ hoàn toàn lỗi xung đột Git (Code 409)
            git pull origin main --rebase
            git push origin main
          else
            echo "[V3000-INFO] Không phát hiện thay đổi mới trên index.html. Bỏ qua chu kỳ commit."
          fi
