name: "ACTIVE-MODULES-SOTA"

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL Drone Landing Page'
        required: false
        default: 'https://donabico-global-media.github.io/8000kicks/'

concurrency:
  group: active-modules-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  execute-siphon-matrix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reset to latest remote main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic

      - name: Run EATHESEN V3000-Ω Matrix + Golden 2px Drone Shield
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://donabico-global-media.github.io/8000kicks/' }}
        run: |
          echo "=== EATHESEN V3000-Ω MASTER MATRIX INJECTOR + GOLDEN 2PX DRONE SHIELD ==="
          cd Modules
          python Active-Modules.py --url "$TARGET_URL"

      - name: Commit & Push (Safe - No Token)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add index.html Modules/traffic_report.json || true
          
          if git diff --cached --quiet; then
            echo "[V3000-INFO] No changes to commit."
          else
            git commit -m "feat(adtech): V3000 Matrix + Golden 2px Drone Shield Activated [skip ci]"
            git push origin main
            echo "[V3000-SUCCESS] Pushed successfully."
          fi