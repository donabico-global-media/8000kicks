name: "ACTIVE-MODULES-SOTA"

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  real-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Latest
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic
          npm install dotenv || echo "skipped"

      - name: Run Real Modules + ULTRA CLEAN
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://donabico-global-media.github.io/8000kicks/' }}
        run: |
          echo "=== V3000 REAL PRODUCTION MODE ==="

          mkdir -p Modules .github/scripts

          # Run all .js files
          for script in .github/scripts/*.js; do
            if [ -f "$script" ]; then
              echo "→ REAL JS: $script"
              node "$script" || echo "Skipped"
            fi
          done

          # Run all .py files (skip simulation)
          for script in Modules/*.py .github/scripts/*.py; do
            if [ -f "$script" ]; then
              if [[ "$script" == *"Performance-Max"* ]]; then
                echo "→ Skipped Simulation"
                continue
              fi
              echo "→ REAL: $script"
              python "$script" --url "$TARGET_URL" || echo "Skipped"
            fi
          done

          # ULTRA CLEAN VIETNAMESE TEXT
          echo '<!-- ULTRA CLEAN VIETNAMESE TEXT -->' >> index.html
          echo '<script>
            function ultraCleanVietnamese() {
              const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
              let node;
              while (node = walker.nextNode()) {
                if (/[àáạảãâầấậẩẫăằắặẳẵèéẹẻẽêềếệểễìíịỉĩòóọỏõôồốộổỗơờớợởỡùúụủũưừứựửữỳýỵỷỹđ]/i.test(node.nodeValue)) {
                  node.nodeValue = node.nodeValue
                    .replace(/KHÁM PHÁ ECO - ADS AUTOMATIC + NODE.JS/gi, "EXPLORE ECO - ADS AUTOMATIC + NODE.JS")
                    .replace(/WAREHOUSE LIVE: .* OFF - Limited time from 8000Kicks!/gi, "WAREHOUSE LIVE: Limited Time Offer from 8000Kicks!")
                    .replace(/Giày Gai Dầu Bền Vững Carbon Negative/gi, "Waterproof Hemp Shoes - Carbon Negative")
                    .replace(/Giày chống nước/gi, "Waterproof Shoes")
                    .replace(/Bền vững/gi, "Sustainable");
                }
              }
            }
            ultraCleanVietnamese();
            setInterval(ultraCleanVietnamese, 600);
          </script>' >> index.html

          # Green Border + Responsive
          echo '<style>
            html, body { overflow-x: hidden !important; max-width: 100vw !important; }
            body {
              border: 4px solid #00ff66 !important;
              box-sizing: border-box;
              animation: pulseGreen 1.5s infinite alternate ease-in-out !important;
              padding: 0 8px;
            }
            @keyframes pulseGreen {
              0% { border-color: #00cc55; }
              100% { border-color: #00ff66; }
            }
            table, .comparison-table {
              width: 100% !important;
              max-width: 100% !important;
              overflow-x: auto;
              display: block;
            }
            img { max-width: 100% !important; height: auto !important; }
          </style>' >> index.html

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .github/scripts/ Modules/ index.html || true
          
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "V3000 REAL + ULTRA CLEAN [skip ci]"
            git push origin main
            echo "Pushed successfully"
          fi