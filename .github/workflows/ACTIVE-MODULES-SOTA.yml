      - name: SYNC & COMMIT WITH CONFLICT RESOLUTION
        run: |
          git config --global user.name 'donabico-global-media'
          git config --global user.email 'donabico.media.system@gmail.com'
          
          # 1. Đưa thay đổi vào Staging Area trước khi Pull
          git add Modules-Bridge.json
          
          # 2. Cập nhật từ remote bằng rebase
          # Nếu có thay đổi ở remote, git sẽ tạm cất commit local, update, rồi áp dụng lại
          git pull --rebase origin main
          
          # 3. Chỉ commit nếu file thực sự có thay đổi so với HEAD
          if ! git diff --cached --quiet; then
            git commit -m "[SYSTEM UPDATE] MA TRẬN MODULES - AUTO SYNC - DONABICO"
            git push origin main
          else
            echo "[-] KHÔNG CÓ THAY ĐỔI MỚI. HỆ THỐNG VẪN PULSING_GREEN."
          fi
