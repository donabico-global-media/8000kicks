name: "ACTIVE-MODULES-SOTA"

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  real-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Latest
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic beautifulsoup4
          npm install dotenv || echo "skipped"

      - name: Run Real Modules + SHIELD AFFILIATE BUTTONS
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://donabico-global-media.github.io/8000kicks/' }}
        run: |
          echo "=== V3000 REAL PRODUCTION MODE ==="

          mkdir -p Modules .github/scripts

          # 1. Chạy các file JS
          for script in .github/scripts/*.js; do
            if [ -f "$script" ]; then
              node "$script" || echo "Skipped JS"
            fi
          done

          # 2. Chạy các file Python trong Modules/ (Hệ thống tự động cô lập lỗi ghi đè)
          for script in Modules/*.py .github/scripts/*.py; do
            if [ -f "$script" ]; then
              if [[ "$script" == *"Performance-Max"* ]]; then
                continue
              fi
              python "$script" --url "$TARGET_URL" || echo "Skipped Python"
            fi
          done

          # 3. PYTHON POST-PROCESSOR: Khôi phục và bảo vệ văn bản nút gốc, xóa bỏ text rác hệ thống
          python -c '
import os
from bs4 import BeautifulSoup

file_path = "index.html"
if os.path.exists(file_path):
    with open(file_path, "r", encoding="utf-8") as f:
        soup = BeautifulSoup(f.read(), "html.parser")
    
    # Tìm tất cả các link affiliate hướng tới 8000kicks và ép nội dung thương mại sạch
    links = soup.find_all("a")
    for link in links:
        href = link.get("href", "")
        if "8000kicks" in href or "sjv.io" in href:
            # Kiểm tra nếu nút bị dính chữ hệ thống, ép trả về chữ kêu gọi hành động chuẩn Tiếng Anh
            link.string = "EXPLORE 8000KICKS WATERPROOF HEMP SHOES NOW"
            # Thêm class hoặc style cố định cho đẹp mắt như trong ảnh mẫu
            link["style"] = "color: #00ff66; font-weight: bold; text-decoration: none;"

    with open(file_path, "w", encoding="utf-8") as f:
        f.write(str(soup))
print("=== SHIELD: Affiliate Buttons Restored & Protected ===")
'

          # 4. ULTRA CLEAN VIETNAMESE TEXT (Bản sửa lỗi không lặp vô hạn)
          echo '<!-- ULTRA CLEAN VIETNAMESE TEXT -->' >> index.html
          echo '<script>
            function ultraCleanVietnamese() {
              const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
              let node;
              while (node = walker.nextNode()) {
                if (node.parentElement && (node.parentElement.closest("a") || node.parentElement.tagName === "A")) {
                  continue; // Tuyệt đối không chạm vào text bên trong thẻ link
                }
                if (/[àáạảãâầấậẩẫăằắặẳẵèéẹẻẽêềếệểễìíịỉĩòóọỏõôồốộổỗơờớợởỡùúụủũưừứựửữỳýỵỷỹđ]/i.test(node.nodeValue)) {
                  node.nodeValue = node.nodeValue
                    .replace(/KHÁM PHÁ ECO - ADS AUTOMATIC \+ NODE\.JS/gi, "EXPLORE ECO")
                    .replace(/Giày Gai Dầu Bền Vững/gi, "Waterproof Hemp Shoes");
                }
              }
            }
            document.addEventListener("DOMContentLoaded", ultraCleanVietnamese);
          </script>' >> index.html

          # Green Border + Responsive Style
          echo '<style>
            html, body { overflow-x: hidden !important; max-width: 100vw !important; }
            body { border: 4px solid #00ff66 !important; box-sizing: border-box; padding: 0 8px; }
            table, .comparison-table { width: 100% !important; max-width: 100% !important; overflow-x: auto; display: block; }
            img { max-width: 100% !important; height: auto !important; }
          </style>' >> index.html

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "V3000 REAL + PYTHON BUTTON SHIELD [skip ci]"
            git push origin main
          fi
