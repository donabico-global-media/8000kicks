name: ACTIVE-MODULES-SOTA

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *' # Chạy mỗi giờ

permissions:
  contents: write 

jobs:
  sota-orchestration:
    runs-on: ubuntu-latest
    
    steps:
      - name: CHECKOUT REPOSITORY
        uses: actions/checkout@v3

      - name: SET UP PYTHON ENVIRONMENT
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: EXECUTE NEURAL SIPHON PROTOCOL
        run: python Modules/Active-Modules.py

      - name: COMMIT AND SYNC RECURSIVE STATE
        run: |
          git config --global user.name 'donabico-global-media'
          git config --global user.email 'donabico.media.system@gmail.com'
          
          # Hủy trạng thái rebase cũ nếu có để làm sạch môi trường
          git rebase --abort || true
          
          # Cập nhật mới nhất từ remote trước khi push
          git pull origin main
          
          # Thêm file đã cập nhật
          git add system_bridge.json
          
          # Kiểm tra nếu file có thay đổi thì commit
          if git diff --cached --quiet; then
            echo "[-] HỆ THỐNG ĐÃ ĐỒNG BỘ - KHÔNG CÓ THAY ĐỔI."
          else
            git commit -m "[SYSTEM UPDATE] TỰ ĐỘNG CẬP NHẬT MA TRẬN SOTA - DONABICO GLOBAL MEDIA"
            git push origin main
          fi
