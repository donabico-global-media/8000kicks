# ║ 24/7 Auto Run All Scripts + Green Border + Fix --url                       ║
# ╚════════════════════════════════════════════════════════════════════════════╝

name: "ACTIVE-MODULES-SOTA"

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-modules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Latest Changes
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python & Node.js
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic
          npm install dotenv || echo "skipped"

      - name: Auto Run All Scripts + UI Enhancement
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://donabico-global-media.github.io/8000kicks/' }}
        run: |
          echo "=== EATHESEN V3000-Ω 24/7 MATRIX START ==="

          mkdir -p Modules .github/scripts

          # Run all .js files
          for script in .github/scripts/*.js; do
            if [ -f "$script" ]; then
              echo "→ Running JS: $script"
              node "$script" || echo "Skipped $script"
            fi
          done

          # Run all .py files WITH --url parameter
          for script in Modules/*.py .github/scripts/*.py; do
            if [ -f "$script" ]; then
              echo "→ Running PY: $script"
              python "$script" --url "$TARGET_URL" || echo "Skipped $script"
            fi
          done

          # Add Green Border Effect
          echo '<!-- V3000 UI ENHANCEMENT - GREEN BORDER -->' >> index.html
          echo '<style>body { border: 4px solid #00ff66 !important; box-sizing: border-box; animation: pulseGreen 1.5s infinite alternate ease-in-out !important; } @keyframes pulseGreen { 0% { border-color: #00cc55; } 100% { border-color: #00ff66; } }</style>' >> index.html

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .github/scripts/ Modules/ index.html || true
          
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "V3000 24/7 Auto-run modules + UI sync [skip ci]"
            git push origin main
            echo "Push successful."
          fi
