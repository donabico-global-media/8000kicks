name: "ACTIVE-MODULES-SOTA"

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: eathesen-siphon-sota-group
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  execute-siphon-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ecosystem Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic loguru
          mkdir -p Modules

      - name: Run EATHESEN Dynamic Siphon Matrix
        env:
          TARGET_URL: "https://donabico-global-media.github.io/8000kicks/"
        run: |
          echo "=== EATHESEN V3000-Ω SOTA AUTO-INJECTION ==="
          cd Modules
          for script in *.py; do
            if [ "$script" != "Active-Modules.py" ]; then
              echo "[EXECUTING MODULE] $script..."
              python "$script" --url "$TARGET_URL" || echo "[V3000-RECOVERY] Module $script gián đoạn, bỏ qua..."
            fi
          done
          
          echo "[EXECUTING CORE] Active-Modules.py..."
          if [ -f "Active-Modules.py" ]; then
            python Active-Modules.py --url "$TARGET_URL"
          else
            echo "[V3000-ERROR] Không tìm thấy tệp Active-Modules.py!"
          fi

      - name: Commit & Push Telemetry Reports
        run: |
          git config --global user.name "AETH-V5000-AUTOBOT"
          git config --global user.email "sre-admin@donabico.global"
          git add Modules/*.json
          if ! git diff --cached --quiet; then
            echo "[V3000-INFO] Phát hiện báo cáo mới. Tiến hành đồng bộ..."
            git commit -m "chore(telemetry): auto-update telemetry logs [skip ci]"
            git pull origin main --rebase
            git push origin main
          else
            echo "[V3000-INFO] Không phát hiện dữ liệu mới."
          fi
