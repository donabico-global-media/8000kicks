name: "ACTIVE-MODULES-SOTA"

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-modules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Latest Changes (Fix fetch first error)
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python & Node.js
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic
          npm install dotenv || echo "skipped"

      - name: Auto Run ALL Scripts + UI Enhancement
        run: |
          echo "=== EATHESEN V3000-Ω MATRIX ==="

          mkdir -p Modules .github/scripts

          # Run .js files
          for script in .github/scripts/*.js; do
            if [ -f "$script" ]; then
              echo "→ Running $script"
              node "$script" || echo "Skipped $script"
            fi
          done

          # Run .py files
          for script in Modules/*.py .github/scripts/*.py; do
            if [ -f "$script" ]; then
              echo "→ Running $script"
              python "$script" || echo "Skipped $script"
            fi
          done

          # Add Green Border Effect
          cat >> index.html << 'EOF'
<!-- V3000 UI ENHANCEMENT -->
<style>
body { 
    border: 4px solid #00ff66 !important; 
    box-sizing: border-box; 
    animation: pulseGreen 1.5s infinite alternate !important;
}
@keyframes pulseGreen { 
    from { border-color: #00cc55; } 
    to { border-color: #00ff66; } 
}
</style>
EOF

      - name: Commit & Push (Safe with Rebase)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .github/scripts/ Modules/ index.html || true
          
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "V3000 24/7 Auto-run + UI sync [skip ci]"
            git push origin main
            echo "Push successful."
          fi
