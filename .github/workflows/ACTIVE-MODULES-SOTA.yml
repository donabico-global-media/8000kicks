name: "ACTIVE-MODULES-SOTA"

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  real-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Latest
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic
          npm install dotenv || echo "skipped"

      - name: Run Real Modules + MAX English Lock
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://donabico-global-media.github.io/8000kicks/' }}
        run: |
          echo "=== V3000 REAL + MAX ENGLISH LOCK ==="

          mkdir -p Modules .github/scripts

          # Run all real .js
          for script in .github/scripts/*.js; do
            if [ -f "$script" ]; then
              echo "→ REAL JS: $script"
              node "$script" || echo "Skipped"
            fi
          done

          # Run real .py (skip simulation)
          for script in Modules/*.py .github/scripts/*.py; do
            if [ -f "$script" ]; then
              if [[ "$script" == *"Performance-Max"* ]]; then
                echo "→ Skipped Simulation"
                continue
              fi
              echo "→ REAL: $script"
              python "$script" --url "$TARGET_URL" || echo "Skipped"
            fi
          done

          # === MAX ENGLISH LOCK (Force toàn bộ nội dung) ===
          echo '<!-- V3000 MAX ENGLISH LOCK -->' >> index.html
          echo '<script>
            // Force Title English
            const ENGLISH_TITLE = "8000Kicks - Waterproof Hemp Shoes | Sustainable & Durable Footwear 2026";
            document.title = ENGLISH_TITLE;

            // Force English Lock - Scan and replace Vietnamese text
            function forceEnglish() {
              // Lock Title
              if (document.title !== ENGLISH_TITLE) {
                document.title = ENGLISH_TITLE;
              }

              // Scan all text nodes and replace Vietnamese
              const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
              let node;
              while (node = walker.nextNode()) {
                if (/[àáạảãâầấậẩẫăằắặẳẵèéẹẻẽêềếệểễìíịỉĩòóọỏõôồốộổỗơờớợởỡùúụủũưừứựửữỳýỵỷỹđ]/i.test(node.nodeValue)) {
                  // Replace common Vietnamese phrases with English
                  node.nodeValue = node.nodeValue
                    .replace(/Giày Gai Dầu Bền Vững Carbon Negative/gi, "Waterproof Hemp Shoes - Carbon Negative")
                    .replace(/Giày chống nước/gi, "Waterproof Shoes")
                    .replace(/Bền vững/gi, "Sustainable")
                    .replace(/Carbon Negative/gi, "Carbon Negative");
                }
              }
            }

            // Run immediately + every 2 seconds
            forceEnglish();
            setInterval(forceEnglish, 2000);
          </script>' >> index.html

          # Green Border
          echo '<style>body{border:4px solid #00ff66!important;box-sizing:border-box;animation:pulseGreen 1.5s infinite alternate ease-in-out!important}@keyframes pulseGreen{0%{border-color:#00cc55}100%{border-color:#00ff66}}</style>' >> index.html

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .github/scripts/ Modules/ index.html || true
          
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "V3000 REAL + MAX ENGLISH LOCK [skip ci]"
            git push origin main
            echo "Pushed"
          fi