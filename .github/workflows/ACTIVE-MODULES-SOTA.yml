name: "ACTIVE-MODULES-SOTA"

on:
  schedule:
    - cron: "0 */6 * * *" # Robot tự động thức dậy đại phẫu trang web mỗi 6 tiếng một lần
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL mục tiêu để rà soát AdTech'
        required: true
        default: 'https://donabico-global-media.github.io/8000kicks/'

# CHỐNG LỖI CONCURRENCY: Khóa luồng deploy để tránh tình trạng các job đè chết nhau gây lỗi Cancelled
concurrency:
  group: github-pages-deploy-lock
  cancel-in-progress: false

permissions:
  contents: write # Cấp quyền ghi cao cấp cho Robot sửa index.html

jobs:
  execute-siphon-matrix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0 # Lấy toàn bộ lịch sử Git phục vụ việc rebase an toàn

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Ecosystem Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic

      - name: Run EATHESEN V3000-Ω Matrix Injection
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://donabico-global-media.github.io/8000kicks/' }}
        run: |
          echo "=== EATHESEN V3000-Ω MASTER MATRIX INJECTOR ==="
          cd Modules
          
          # Thực thi kiến trúc mới: Truyền tham số cấu hình URL trực tiếp vào file chỉ huy lõi
          if [ -f "Active-Modules.py" ]; then
            echo "[FORCED ACTIVE] Bộ não trung tâm bắt đầu tiêm và sửa đổi mã nguồn..."
            python Active-Modules.py --url "$TARGET_URL"
          else
            echo "[CRITICAL ERROR] Thiếu file Active-Modules.py!"
            exit 1
          fi

      - name: Commit & Push Production Interface & Reports
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # ĐĂNG KÝ PHẠM VI TÁC ĐỘNG: Đóng gói đồng thời index.html đã tối ưu và file báo cáo JSON về kho
          git add index.html Modules/traffic_report.json || git add index.html || true
          
          if ! git diff-index --quiet HEAD --; then
            echo "[V3000-INFO] Phát hiện thay đổi mã nguồn từ Robot. Tiến hành cập nhật trực tuyến..."
            git commit -m "feat(adtech): dynamic active-modules production injection [skip ci]"
            
            # GIẢI PHÁP CHỐNG XUNG ĐỘT: Đồng bộ dữ liệu mới nhất bằng Rebase trước khi đẩy lên Main
            git pull origin main --rebase
            git push origin main
          else
            echo "[V3000-INFO] Không phát hiện thay đổi mới. Chu kỳ đóng gói kết thúc."
          fi
